---
name: Publish Docker

on:
  push:

env:
  IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/arma-reforger:latest

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image
        run: docker build . -t arma-reforger
      - name: Save Image
        run: docker save arma-reforger | gzip > image.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image
          path: image.tar.gz
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test Image
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image
      - name: Load Image
        run: docker load < image.tar.gz
      - name: Run Image
        run: >
          docker run -d
          -e SERVER_A2S_ADDRESS=0.0.0.0
          -e SERVER_A2S_PORT=17777
          -e RCON_PASSWORD=PipelineTest123
          -p 17777:17777/udp
          arma-reforger
      - name: Install python dependencies
        run: python3 -m pip install python-a2s
      - name: Run Test
        run: python3 ./.github/scripts/steam-query.py

  main_publish:
    name: Publish Image
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image
      - name: Load Image
        run: docker load < image.tar.gz
      - name: Tag Image
        run: docker tag arma-reforger "$IMAGE_TAG"
      - name: Push Image
        run: docker push "$IMAGE_TAG"
